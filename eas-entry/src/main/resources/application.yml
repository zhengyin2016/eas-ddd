server:
  port: 8080
  servlet:
    context-path: /eas

spring:
  application:
    name: eas-ddd
  datasource:
    url: jdbc:mysql://localhost:3306/eas?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.eas.**.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.eas: debug
